# Pytest configuration for Neural Machine Translation tests

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show summary of all test outcomes
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --cov=lib
    --cov-report=html
    --cov-report=term-missing

# Markers for categorizing tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    transformer: marks tests for transformer architecture
    lstm: marks tests for LSTM architecture
    bleu: marks tests for BLEU metric
    gpu: marks tests that require GPU

# Minimum coverage threshold
[coverage:report]
precision = 2
show_missing = True

[coverage:run]
source = lib
omit = 
    */tests/*
    */test_*.py
    */__init__.py
